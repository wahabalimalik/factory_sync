name: Build sync_agent.exe

on:
  push:
    paths:
      - 'sync_agent.py'
      - 'requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build the standalone exe
        run: pyinstaller --onefile --name sync_agent --console sync_agent.py

      - name: Upload the exe so you can download it
        uses: actions/upload-artifact@v4
        with:
          name: sync_agent-exe
          path: dist/sync_agent.exe
